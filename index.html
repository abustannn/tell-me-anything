<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS Native Dark Theme Rules */
        :root {
            --bg-global: #000000;
            --bg-container: #000000;
            --border: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --input-bg: #1c1c1e;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --nav-bg: rgba(0, 0, 0, 0.75);
            --accent: #0a84ff;
            --danger: #ff453a;
            
            /* Chat Bubble Variants */
            --bubble-outbound: linear-gradient(180deg, #2f96ff 0%, #007aff 100%);
            --bubble-inbound: #262629;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* App Shell Frame Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--bg-container);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 421px) {
            .app-container {
                height: 85vh;
                border-radius: 24px;
                border: 1px solid var(--border);
                box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            }
        }

        /* Screen View Architecture */
        .view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            background: var(--bg-container);
        }

        #listView { z-index: 2; transform: translateX(0); }
        #chatView { z-index: 3; transform: translateX(100%); }
        .slide-out { transform: translateX(-20%); }
        .slide-in { transform: translateX(0) !important; }

        /* iOS Translucent Navbar styling */
        .ios-navbar {
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-header {
            flex-direction: column;
            align-items: flex-start;
            padding-top: 16px;
            padding-bottom: 12px;
            width: 100%;
            gap: 10px;
        }

        .list-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .compose-btn {
            background: none;
            border: none;
            font-size: 17px;
            cursor: pointer;
            color: var(--accent);
            outline: none;
            font-weight: 500;
        }

        .list-header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        /* Native iOS Search Wrapper Field Architecture */
        .search-wrapper {
            width: 100%;
            position: relative;
            margin-top: 2px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: #1c1c1e;
            border-radius: 10px;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .search-input::placeholder {
            color: #8e8e93;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e93;
            font-size: 14px;
            pointer-events: none;
        }

        /* Conversation Thread Lists */
        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }

        .thread-item {
            display: flex;
            padding: 14px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #1c1c1e;
            align-items: center;
        }

        .thread-item:active {
            background-color: #1c1c1e;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2c2c2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
            flex-shrink: 0;
        }

        .thread-details {
            flex: 1;
            overflow: hidden;
        }

        .thread-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .thread-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        .thread-time {
            font-size: 14px;
            color: var(--text-muted);
        }

        .thread-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lock-badge {
            font-size: 12px;
            margin-left: 4px;
        }

        /* Chat View Elements */
        .chat-navbar {
            justify-content: space-between;
        }

        .back-btn {
            color: var(--accent);
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 17px;
            background: none;
            border: none;
            outline: none;
        }

        .chat-title-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .chat-title-main {
            font-size: 16px;
            font-weight: 600;
        }

        /* Message Feed Immersive Bubble Framework */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
            background: #000000;
        }

        .message-card {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease-out;
        }

        /* Native iOS Bubble Structural Splits */
        .message-card.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-card.received {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bubble-content {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-word;
        }

        .sent .bubble-content {
            background: var(--bubble-outbound);
            color: #ffffff;
        }

        .received .bubble-content {
            background: var(--bubble-inbound);
            color: #ffffff;
        }

        /* Native Image Handling Inside/Outside Bubbles */
        .message-image-wrapper {
            margin-bottom: 4px;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
            display: block;
        }

        .message-image {
            width: 100%;
            max-width: 240px;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            display: block;
            transition: opacity 0.15s ease;
        }

        .message-image-wrapper:hover .message-image {
            opacity: 0.9;
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 6px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            font-size: 14px;
        }

        /* Input Composition Area */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: #000000;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .identity-lock-banner {
            display: none;
            background: rgba(10, 132, 255, 0.15);
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
        }

        .attachment-row {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1c1c1e;
            border-radius: 20px;
            padding: 4px 8px 4px 14px;
        }

        .ios-input {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            resize: none;
            height: 36px;
            line-height: 20px;
        }

        .file-label {
            color: var(--accent);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-right: 4px;
        }

        .file-label.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .preview-container {
            display: none;
            position: relative;
            align-self: flex-start;
            margin-bottom: 4px;
            padding-left: 45px;
        }

        .img-preview {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .remove-preview {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-pill-btn {
            background: var(--accent);
            color: #ffffff;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }

        .send-pill-btn:disabled {
            background: #2c2c2e;
            color: #8e8e93;
            pointer-events: none;
        }

        /* Lightbox Overlay View */
        .image-modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 500;
            display: none;
            opacity: 0;
            justify-content: center;
            align-items: center;
            padding: 24px;
            transition: opacity 0.2s ease;
        }

        .image-modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 510;
        }

        .expanded-modal-image {
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
            border-radius: 14px;
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.1, 1, 0.1, 1);
        }

        .image-modal-overlay.active .expanded-modal-image {
            transform: scale(1);
        }

        /* Lock Security Screen */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-container);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
        }

        .lock-overlay.active {
            display: flex;
            transform: translateY(0);
        }

        .lock-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .lock-input {
            width: 160px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 6px;
            padding: 10px;
            border-radius: 12px;
            border: none;
            background: #1c1c1e;
            color: var(--text-main);
            outline: none;
            margin-bottom: 24px;
        }

        .lock-actions {
            display: flex;
            gap: 16px;
            width: 180px;
        }

        .lock-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .lock-btn-cancel { background: transparent; color: var(--accent); }
        .lock-btn-submit { background: #ffffff; color: #000000; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="image-modal-overlay" id="imageModal">
        <button class="modal-close-btn" id="closeModalBtn">✕ Close</button>
        <img src="" class="expanded-modal-image" id="modalTargetImg" alt="Expanded image">
    </div>

    <div class="lock-overlay" id="lockOverlay">
        <div style="font-size: 40px; margin-bottom: 16px;">🔒</div>
        <div class="lock-title" id="lockTargetTitle">Thread Locked</div>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="lock-input" id="passcodeInput" placeholder="••••••">
        <div class="lock-actions">
            <button type="button" class="lock-btn lock-btn-cancel" id="lockCancelBtn">Cancel</button>
            <button type="button" class="lock-btn lock-btn-submit" id="lockSubmitBtn">Enter</button>
        </div>
    </div>

    <div class="view" id="listView">
        <div class="ios-navbar list-header">
            <div class="list-header-top">
                <span style="color: var(--accent); font-size: 17px; cursor: pointer;">Edit</span>
                <button class="compose-btn" id="addNewContactBtn">📝</button>
            </div>
            <h1>Messages</h1>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="threadSearchInput" placeholder="Search">
            </div>
        </div>
        <div class="conversation-list" id="threadContainer">
            </div>
    </div>

    <div class="view" id="chatView">
        <div class="ios-navbar chat-navbar">
            <button class="back-btn" id="backBtn">◀ Messages</button>
            <div class="chat-title-container">
                <div class="chat-title-main" id="chatTitle">Christian Abustan</div>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="feed" id="messageFeed">
            </div>

        <div class="input-area">
            <form id="messageForm" class="input-group">
                <div class="identity-lock-banner" id="identityLockBanner">
                    Active Codename: None (Tap to add)
                </div>

                <div class="preview-container" id="previewContainer">
                    <img src="" id="imgPreview" class="img-preview">
                    <button type="button" class="remove-preview" id="removePreviewBtn">×</button>
                </div>

                <div class="attachment-row">
                    <label for="imageInput" class="file-label" id="fileLabelBtn">📷</label>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    
                    <input type="text" id="messageInput" class="ios-input" placeholder="iMessage" autocomplete="off">
                    <button type="submit" id="submitBtn" class="send-pill-btn">↑</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script>
    // New Supabase Project Credentials Setup
    const SUPABASE_URL = 'https://jlbfzhzcunesctqbusfa.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_it3xCpKj-zWj7Chayq-_eQ_Fd1FcLki';
    const supabaseClient = supabase.createClient(https://jlbfzhzcunesctqbusfa.supabase.co, sb_publishable_it3xCpKj-zWj7Chayq-_eQ_Fd1FcLki);

    // Nodes List
    const listView = document.getElementById('listView');
    const chatView = document.getElementById('chatView');
    const threadContainer = document.getElementById('threadContainer');
    const messageFeed = document.getElementById('messageFeed');
    const backBtn = document.getElementById('backBtn');
    const chatTitle = document.getElementById('chatTitle');
    const addNewContactBtn = document.getElementById('addNewContactBtn');
    const threadSearchInput = document.getElementById('threadSearchInput');

    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const submitBtn = document.getElementById('submitBtn');
    const imageInput = document.getElementById('imageInput');
    const fileLabelBtn = document.getElementById('fileLabelBtn');
    const previewContainer = document.getElementById('previewContainer');
    const imgPreview = document.getElementById('imgPreview');
    const removePreviewBtn = document.getElementById('removePreviewBtn');
    const identityLockBanner = document.getElementById('identityLockBanner');

    const imageModal = document.getElementById('imageModal');
    const modalTargetImg = document.getElementById('modalTargetImg');
    const closeModalBtn = document.getElementById('closeModalBtn');

    const lockOverlay = document.getElementById('lockOverlay');
    const lockTargetTitle = document.getElementById('lockTargetTitle');
    const passcodeBtn = document.getElementById('lockSubmitBtn');
    const passcodeCancelBtn = document.getElementById('lockCancelBtn');
    const passcodeInput = document.getElementById('passcodeInput');

    let currentActiveThread = "Christian Abustan";
    let allGlobalMessages = [];
    let selectedFile = null;
    let searchQueryText = "";
    
    let savedUserCodenameForChristian = "";
    let customEmptyThreads = [];

    const PROTECTED_THREADS = { "eren": { pin: "052506" } };

    // File Selections Rules
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            imgPreview.src = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
        }
    });

    removePreviewBtn.addEventListener('click', () => {
        selectedFile = null;
        imageInput.value = '';
        previewContainer.style.display = 'none';
        imgPreview.src = '';
    });

    // Filtering layout hooks
    threadSearchInput.addEventListener('input', (e) => {
        searchQueryText = e.target.value.toLowerCase().trim();
        renderThreadDeck();
    });

    backBtn.addEventListener('click', () => {
        chatView.classList.remove('slide-in');
        listView.classList.remove('slide-out');
    });

    function openImageModal(url) {
        modalTargetImg.src = url;
        imageModal.style.display = 'flex';
        setTimeout(() => imageModal.classList.add('active'), 10);
    }

    function closeImageModal() {
        imageModal.classList.remove('active');
        setTimeout(() => {
            imageModal.style.display = 'none';
            modalTargetImg.src = '';
        }, 200);
    }

    closeModalBtn.addEventListener('click', closeImageModal);
    imageModal.addEventListener('click', (e) => {
        if (e.target === imageModal) closeImageModal();
    });

    function handleThreadSelection(codename) {
        const targetLower = codename.trim().toLowerCase();
        if (PROTECTED_THREADS[targetLower]) {
            lockTargetTitle.innerText = `Enter Passcode`;
            passcodeInput.value = '';
            lockOverlay.style.display = 'flex';
            setTimeout(() => lockOverlay.classList.add('active'), 10);
            
            passcodeBtn.onclick = () => {
                if (passcodeInput.value === PROTECTED_THREADS[targetLower].pin) {
                    dismissSecurityGate();
                    navigateToChat(codename);
                } else {
                    alert("Incorrect Passcode!");
                    passcodeInput.value = '';
                }
            };
            return;
        }
        navigateToChat(codename);
    }

    function dismissSecurityGate() {
        lockOverlay.classList.remove('active');
        setTimeout(() => lockOverlay.style.display = 'none', 300);
    }

    passcodeCancelBtn.addEventListener('click', dismissSecurityGate);

    function navigateToChat(codename) {
        currentActiveThread = codename;
        chatTitle.innerText = codename;
        updateInputLockState();
        renderActiveChatMessages();
        listView.classList.add('slide-out');
        chatView.classList.add('slide-in');
    }

    function updateInputLockState() {
        if (currentActiveThread.toLowerCase() === "christian abustan") {
            if (!savedUserCodenameForChristian) {
                identityLockBanner.style.display = 'block';
                identityLockBanner.innerText = "⚠️ Required: Set sender Codename first...";
                messageInput.placeholder = "Tap here to unlock input bar...";
                messageInput.disabled = true;
                submitBtn.disabled = true;
                fileLabelBtn.classList.add('disabled');
            } else {
                identityLockBanner.style.display = 'block';
                identityLockBanner.innerText = `Anonymously as: @${savedUserCodenameForChristian}`;
                messageInput.placeholder = "iMessage";
                messageInput.disabled = false;
                submitBtn.disabled = false;
                fileLabelBtn.classList.remove('disabled');
            }
        } else {
            identityLockBanner.style.display = 'none';
            messageInput.placeholder = "iMessage";
            messageInput.disabled = false;
            submitBtn.disabled = false;
            fileLabelBtn.classList.remove('disabled');
        }
    }

    function triggerCodenameSetupPrompt() {
        const alias = prompt("Enter your sender Codename:");
        if (alias && alias.trim().length > 0) {
            savedUserCodenameForChristian = alias.trim();
            updateInputLockState();
        }
    }

    identityLockBanner.addEventListener('click', triggerCodenameSetupPrompt);
    messageInput.addEventListener('click', () => {
        if (messageInput.disabled && currentActiveThread.toLowerCase() === "christian abustan") {
            triggerCodenameSetupPrompt();
        }
    });

    addNewContactBtn.addEventListener('click', () => {
        const name = prompt("Enter contact name:");
        if (name && name.trim().length > 0) {
            const formattedName = name.trim();
            const threadExists = allGlobalMessages.some(m => m.codename.toLowerCase() === formattedName.toLowerCase()) || 
                                 customEmptyThreads.includes(formattedName);
            if (!threadExists) {
                customEmptyThreads.push(formattedName);
                renderThreadDeck();
            }
            handleThreadSelection(formattedName);
        }
    });

    async function fetchSystemLogs() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('id', { ascending: true });

        if (error) return;

        allGlobalMessages = data || [];
        renderThreadDeck();
        if (chatView.classList.contains('slide-in')) {
            renderActiveChatMessages();
        }
    }

    function renderThreadDeck() {
        const threadsMap = {};

        threadsMap["Christian Abustan"] = {
            codename: "Christian Abustan",
            text: "Tap to leave an anonymous note...",
            created_at: new Date().toISOString()
        };

        // Always ensure standard pre-configured system contacts display even when database data is null
        Object.keys(PROTECTED_THREADS).forEach(protectedName => {
            threadsMap[protectedName] = {
                codename: protectedName,
                text: "Encrypted Room...",
                created_at: new Date(0).toISOString() 
            };
        });

        customEmptyThreads.forEach(name => {
            threadsMap[name] = {
                codename: name,
                text: "No messages yet...",
                created_at: new Date().toISOString()
            };
        });

        allGlobalMessages.forEach(msg => {
            const lowerCodename = msg.codename.toLowerCase();
            if (msg.codename.toLowerCase() !== "christian abustan") {
                if (!threadsMap[lowerCodename] || !threadsMap[lowerCodename].id || new Date(msg.created_at) > new Date(threadsMap[lowerCodename].created_at)) {
                    threadsMap[lowerCodename] = msg;
                }
            } else {
                if (!threadsMap["Christian Abustan"].id || new Date(msg.created_at) > new Date(threadsMap["Christian Abustan"].created_at)) {
                    threadsMap["Christian Abustan"] = msg;
                }
            }
        });

        let sortedThreads = Object.values(threadsMap).sort((a, b) => {
            if (a.codename.toLowerCase() === "eren" && !a.id) return 1; 
            if (b.codename.toLowerCase() === "eren" && !b.id) return -1;
            return new Date(b.created_at) - new Date(a.created_at);
        });

        // Filter layout query rules
        if (searchQueryText) {
            sortedThreads = sortedThreads.filter(t => t.codename.toLowerCase().includes(searchQueryText));
        }

        threadContainer.innerHTML = '';
        sortedThreads.forEach(th => {
            const displayName = th.codename;
            const initials = displayName.substring(0, 2).toUpperCase();
            const date = th.id ? new Date(th.created_at) : new Date();
            const timeLabel = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const isLocked = !!PROTECTED_THREADS[displayName.trim().toLowerCase()];
            const lockIndicator = isLocked ? '<span class="lock-badge">🔒</span>' : '';

            let previewText = th.text;
            if (th.id && !previewText) {
                previewText = "📷 Image attachment";
            }

            const div = document.createElement('div');
            div.className = 'thread-item';
            div.innerHTML = `
                <div class="avatar"><span>${escapeHTML(initials)}</span></div>
                <div class="thread-details">
                    <div class="thread-meta">
                        <span class="thread-name">${escapeHTML(displayName)} ${lockIndicator}</span>
                        <span class="thread-time">${timeLabel}</span>
                    </div>
                    <div class="thread-preview">${isLocked && !th.id ? '<i>Encrypted Room</i>' : escapeHTML(previewText)}</div>
                </div>
            `;
            div.addEventListener('click', () => handleThreadSelection(displayName));
            threadContainer.appendChild(div);
        });
    }

    function renderActiveChatMessages() {
        messageFeed.innerHTML = '';
        const subset = allGlobalMessages.filter(m => m.codename.toLowerCase() === currentActiveThread.toLowerCase());

        if (subset.length === 0) {
            messageFeed.innerHTML = `<div class="empty-state">iMessage History with ${escapeHTML(currentActiveThread)}</div>`;
            return;
        }

        subset.forEach(msg => {
            const card = document.createElement('div');
            
            // Outbound targets match context rules purely based on codename text matching now
            const isChristian = currentActiveThread.toLowerCase() === "christian abustan";
            const isOutbound = isChristian ? (msg.text && msg.text.startsWith(`[from: @${savedUserCodenameForChristian}]`)) : false;
            
            card.className = `message-card ${isOutbound ? 'sent' : 'received'}`;
            const timeLabel = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let imageHTML = '';
            if (msg.image_url) {
                imageHTML = `
                    <div class="message-image-wrapper" onclick="openImageModal('${msg.image_url}')">
                        <img src="${msg.image_url}" class="message-image" alt="Attachment">
                    </div>
                `;
            }

            // Strip author meta markers cleanly out of the display strings
            let cleanText = msg.text || '';
            if (isChristian && cleanText.startsWith(`[from: @`)) {
                cleanText = cleanText.substring(cleanText.indexOf('] ') + 2);
            }

            const textHTML = cleanText ? `<div class="bubble-content">${escapeHTML(cleanText)}</div>` : '';
            
            // Build simple clean message tags
            let tagLabel = `@${msg.codename}`;
            if (isChristian && msg.text && msg.text.startsWith(`[from: @`)) {
                const captured = msg.text.match(/^\[from:\s*@([^\]]+)\]/);
                if (captured) tagLabel = `via @${captured[1]}`;
            }

            card.innerHTML = `
                ${imageHTML}
                ${textHTML}
                <div class="message-meta">${escapeHTML(tagLabel)} • ${timeLabel}</div>
            `;
            messageFeed.appendChild(card);
        });

        messageFeed.scrollTop = messageFeed.scrollHeight;
    }

    // Form pipeline submission
    messageForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        let text = messageInput.value.trim();
        if (!text && !selectedFile) return;

        if (currentActiveThread.toLowerCase() === "christian abustan" && !savedUserCodenameForChristian) {
            triggerCodenameSetupPrompt();
            return;
        }

        submitBtn.disabled = true;
        let image_url = null;

        if (selectedFile) {
            const ext = selectedFile.name.split('.').pop();
            const path = `${Math.random().toString(36).substring(2)}-${Date.now()}.${ext}`;

            const { error: uploadError } = await supabaseClient.storage
                .from('message-images')
                .upload(path, selectedFile);

            if (uploadError) {
                alert(`Upload error: ${uploadError.message}`);
                submitBtn.disabled = false;
                return;
            }

            const { data } = supabaseClient.storage.from('message-images').getPublicUrl(path);
            image_url = data.publicUrl;
        }

        // Bundle sender context inline inside the text field dynamically to keep database queries seamless
        if (currentActiveThread.toLowerCase() === "christian abustan") {
            text = `[from: @${savedUserCodenameForChristian}] ${text}`;
        }

        const dbPayload = {
            codename: currentActiveThread,
            text: text || null,
            image_url: image_url
        };

        const { error } = await supabaseClient.from('messages').insert([dbPayload]);
        submitBtn.disabled = false;

        if (!error) {
            customEmptyThreads = customEmptyThreads.filter(name => name.toLowerCase() !== currentActiveThread.toLowerCase());
            messageInput.value = '';
            selectedFile = null;
            previewContainer.style.display = 'none';
            imgPreview.src = '';
            fetchSystemLogs();
        } else {
            alert("Could not send message.");
        }
    });

    // Helper functions
    function escapeHTML(str) {
        return str ? str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)) : '';
    }

    fetchSystemLogs();
    setInterval(fetchSystemLogs, 5000);
</script>
