<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages</title>
    <!-- Include Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS Minimalist Monochrome Theme */
        :root {
            --bg-global: #fafafa;
            --bg-container: #ffffff;
            --border: #e5e5ea;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --input-bg: #f2f2f7;
            --btn-bg: #1c1c1e;
            --btn-text: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.85);
            --accent: #007aff;
            --danger: #ff3b30;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-global: #121212;
                --bg-container: #1c1c1e;
                --border: #2c2c2e;
                --text-main: #ffffff;
                --text-muted: #8e8e93;
                --input-bg: #2c2c2e;
                --btn-bg: #ffffff;
                --btn-text: #1c1c1e;
                --nav-bg: rgba(28, 28, 30, 0.85);
                --accent: #0a84ff;
                --danger: #ff453a;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s;
        }

        /* App Shell Frame Container */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--bg-container);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 421px) {
            .app-container {
                height: 85vh;
                border-radius: 24px;
                border: 1px solid var(--border);
                box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            }
        }

        /* Screen View Architecture */
        .view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            background: var(--bg-container);
        }

        #listView { z-index: 2; transform: translateX(0); }
        #chatView { z-index: 3; transform: translateX(100%); }
        .slide-out { transform: translateX(-20%); }
        .slide-in { transform: translateX(0) !important; }

        /* iOS Translucent Navbar styling */
        .ios-navbar {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--nav-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-header {
            flex-direction: column;
            align-items: flex-start;
            padding-top: 24px;
            padding-bottom: 16px;
            width: 100%;
        }

        .list-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 8px;
        }

        .compose-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--accent);
            outline: none;
        }

        .list-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .list-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Conversation Thread Lists */
        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }

        .thread-item {
            display: flex;
            padding: 16px 20px;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .thread-item:active {
            background-color: var(--input-bg);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--input-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .thread-details {
            flex: 1;
            overflow: hidden;
        }

        .thread-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .thread-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .thread-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .thread-preview {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Lock Icon badge */
        .lock-badge {
            font-size: 12px;
            margin-left: 4px;
        }

        /* Chat View Elements */
        .chat-navbar {
            justify-content: space-between;
        }

        .back-btn {
            color: var(--accent);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 15px;
            background: none;
            border: none;
            outline: none;
        }

        .chat-title-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .chat-title-main {
            font-size: 15px;
            font-weight: 600;
        }

        /* Message Feed Cards Style */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-card {
            align-self: flex-start;
            width: 100%;
            max-width: 90%;
            animation: fadeIn 0.25s ease-out;
        }

        .message-image {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 6px;
            display: block;
            background-color: var(--input-bg);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.45;
            color: var(--text-main);
            word-break: break-word;
        }

        .message-card.prompt-card .message-text {
            color: var(--text-muted);
            font-style: italic;
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            font-size: 14px;
        }

        /* Input Composition Area */
        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-container);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ios-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        textarea.ios-input {
            resize: none;
            height: 64px;
        }

        .attachment-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-label {
            background: var(--input-bg);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            transition: opacity 0.1s;
        }

        .file-label:active {
            opacity: 0.6;
        }

        .preview-container {
            display: none;
            position: relative;
            align-self: flex-start;
            margin-bottom: 4px;
        }

        .img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .remove-preview {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ios-btn {
            flex: 1;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            height: 45px;
            transition: opacity 0.1s, transform 0.1s;
        }

        .ios-btn:active {
            opacity: 0.8;
            transform: scale(0.99);
        }

        /* Passcode Security Sheet Layer Overlay */
        .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-container);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
        }

        .lock-overlay.active {
            display: flex;
            transform: translateY(0);
        }

        .lock-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.4px;
        }

        .lock-hint {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            background: var(--input-bg);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .lock-input {
            width: 160px;
            text-align: center;
            font-size: 24px;
            letter-spacing: 6px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-main);
            outline: none;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .lock-actions {
            display: flex;
            gap: 12px;
            width: 160px;
        }

        .lock-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .lock-btn-cancel {
            background: transparent;
            color: var(--accent);
        }

        .lock-btn-submit {
            background: var(--btn-bg);
            color: var(--btn-text);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">

    <!-- SECURITY SHEET: Passcode Shield Intercept Gate -->
    <div class="lock-overlay" id="lockOverlay">
        <div style="font-size: 40px; margin-bottom: 16px;">🔒</div>
        <div class="lock-title" id="lockTargetTitle">Thread Locked</div>
        <div class="lock-hint" id="lockHintField">Hint: birthdate</div>
        <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" class="lock-input" id="passcodeInput" placeholder="••••••">
        <div class="lock-actions">
            <button type="button" class="lock-btn lock-btn-cancel" id="lockCancelBtn">Cancel</button>
            <button type="button" class="lock-btn lock-btn-submit" id="lockSubmitBtn">Enter</button>
        </div>
    </div>

    <!-- VIEW 1: Contacts/Conversations Thread Deck -->
    <div class="view" id="listView">
        <div class="ios-navbar list-header">
            <div class="list-header-top">
                <span style="color: var(--accent); font-size: 15px;">Edit</span>
                <button class="compose-btn" id="addNewContactBtn">📝</button>
            </div>
            <h1>Messages</h1>
            <p>Anonymous and secure</p>
        </div>
        <div class="conversation-list" id="threadContainer">
            <!-- Dynamic contacts rendering -->
        </div>
    </div>

    <!-- VIEW 2: Chat Stream Room View -->
    <div class="view" id="chatView">
        <div class="ios-navbar chat-navbar">
            <button class="back-btn" id="backBtn">◀ Messages</button>
            <div class="chat-title-container">
                <div class="chat-title-main" id="chatTitle">Christian Abustan</div>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="feed" id="messageFeed">
            <!-- Message cards render here -->
        </div>

        <div class="input-area">
            <form id="messageForm" class="input-group">
                <div class="preview-container" id="previewContainer">
                    <img src="" id="imgPreview" class="img-preview">
                    <button type="button" class="remove-preview" id="removePreviewBtn">×</button>
                </div>

                <div class="attachment-row">
                    <label for="imageInput" class="file-label">🖼️</label>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    
                    <textarea id="messageInput" class="ios-input" placeholder="Write a message..." required maxlength="300"></textarea>
                    <button type="submit" id="submitBtn" class="ios-btn">Send</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://muxekpbcawffuvszaxmk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q-MoQP1-Assz9V9UJQP4LQ_q7E8GowV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Dom Registries
    const listView = document.getElementById('listView');
    const chatView = document.getElementById('chatView');
    const threadContainer = document.getElementById('threadContainer');
    const messageFeed = document.getElementById('messageFeed');
    const backBtn = document.getElementById('backBtn');
    const chatTitle = document.getElementById('chatTitle');
    const addNewContactBtn = document.getElementById('addNewContactBtn');

    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const submitBtn = document.getElementById('submitBtn');
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const imgPreview = document.getElementById('imgPreview');
    const removePreviewBtn = document.getElementById('removePreviewBtn');

    // Security Gate Registry
    const lockOverlay = document.getElementById('lockOverlay');
    const lockTargetTitle = document.getElementById('lockTargetTitle');
    const passcodeBtn = document.getElementById('lockSubmitBtn');
    const passcodeCancelBtn = document.getElementById('lockCancelBtn');
    const passcodeInput = document.getElementById('passcodeInput');

    let currentActiveThread = "Christian Abustan";
    let allGlobalMessages = [];
    let selectedFile = null;
    
    // Memory tracker for locally added empty codename threads
    let customEmptyThreads = [];

    // Lock definitions schema configurations
    const PROTECTED_THREADS = {
        "eren": { pin: "052506", hint: "birthdate" }
    };

    // Handle Media Selection
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            imgPreview.src = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
        }
    });

    removePreviewBtn.addEventListener('click', () => {
        selectedFile = null;
        imageInput.value = '';
        previewContainer.style.display = 'none';
        imgPreview.src = '';
    });

    // Navigation triggers
    backBtn.addEventListener('click', () => {
        chatView.classList.remove('slide-in');
        listView.classList.remove('slide-out');
    });

    // Gate entry verification
    function handleThreadSelection(codename) {
        const targetLower = codename.trim().toLowerCase();
        
        if (PROTECTED_THREADS[targetLower]) {
            // Trigger Passcode Gate Overlay
            lockTargetTitle.innerText = `Enter Passcode for ${codename}`;
            passcodeInput.value = '';
            lockOverlay.style.display = 'flex';
            setTimeout(() => lockOverlay.classList.add('active'), 10);
            
            // Intercept route execution state
            passcodeBtn.onclick = () => {
                if (passcodeInput.value === PROTECTED_THREADS[targetLower].pin) {
                    dismissSecurityGate();
                    navigateToChat(codename);
                } else {
                    alert("Incorrect Passcode!");
                    passcodeInput.value = '';
                }
            };
            return;
        }

        // Default thread pass-through route
        navigateToChat(codename);
    }

    function dismissSecurityGate() {
        lockOverlay.classList.remove('active');
        setTimeout(() => lockOverlay.style.display = 'none', 300);
    }

    passcodeCancelBtn.addEventListener('click', dismissSecurityGate);

    function navigateToChat(codename) {
        currentActiveThread = codename;
        chatTitle.innerText = codename;
        renderActiveChatMessages();
        listView.classList.add('slide-out');
        chatView.classList.add('slide-in');
    }

    // Add new custom thread/contact handler
    addNewContactBtn.addEventListener('click', () => {
        const name = prompt("Enter new Contact name or Codename:");
        if (name && name.trim().length > 0) {
            const formattedName = name.trim();
            
            const threadExists = allGlobalMessages.some(m => m.codename.toLowerCase() === formattedName.toLowerCase()) || 
                                 customEmptyThreads.includes(formattedName);
            
            if (!threadExists) {
                customEmptyThreads.push(formattedName);
                renderThreadDeck();
            }
            handleThreadSelection(formattedName);
        }
    });

    // Sync from database
    async function fetchSystemLogs() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('id', { ascending: true });

        if (error) {
            console.error(error);
            return;
        }

        allGlobalMessages = data || [];
        renderThreadDeck();
        if (chatView.classList.contains('slide-in')) {
            renderActiveChatMessages();
        }
    }

    function renderThreadDeck() {
        const threadsMap = {};

        // Primary placeholder deck anchors
        threadsMap["Christian Abustan"] = {
            codename: "Christian Abustan",
            text: "Tap here to leave an anonymous note...",
            created_at: new Date().toISOString()
        };

        // Inject manually created codenames into map
        customEmptyThreads.forEach(name => {
            threadsMap[name] = {
                codename: name,
                text: "No messages yet. Tap to start writing...",
                created_at: new Date().toISOString()
            };
        });

        // Map database records over memory arrays
        allGlobalMessages.forEach(msg => {
            threadsMap[msg.codename] = msg;
        });

        const sortedThreads = Object.values(threadsMap).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        threadContainer.innerHTML = '';
        sortedThreads.forEach(th => {
            const initials = th.codename.substring(0, 2).toUpperCase();
            const date = new Date(th.created_at);
            const timeLabel = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Render lock status icons on protected channels
            const isLocked = !!PROTECTED_THREADS[th.codename.trim().toLowerCase()];
            const lockIndicator = isLocked ? '<span class="lock-badge">🔒</span>' : '';

            const div = document.createElement('div');
            div.className = 'thread-item';
            div.innerHTML = `
                <div class="avatar"><span>${escapeHTML(initials)}</span></div>
                <div class="thread-details">
                    <div class="thread-meta">
                        <span class="thread-name">${escapeHTML(th.codename)} ${lockIndicator}</span>
                        <span class="thread-time">${timeLabel}</span>
                    </div>
                    <div class="thread-preview">${isLocked ? '<i>Thread is Passcode Protected</i>' : escapeHTML(th.text || "Sent an image")}</div>
                </div>
            `;
            div.addEventListener('click', () => handleThreadSelection(th.codename));
            threadContainer.appendChild(div);
        });
    }

    // Text message layout framework parser 
    function renderActiveChatMessages() {
        messageFeed.innerHTML = '';
        const subset = allGlobalMessages.filter(m => m.codename === currentActiveThread);

        if (subset.length === 0) {
            const card = document.createElement('div');
            card.className = 'message-card prompt-card';
            card.innerHTML = `
                <div class="message-text">This is the start of your anonymous message history with @${escapeHTML(currentActiveThread)}. Send a note below to save this thread permanently.</div>
                <div class="message-meta">System Prompt</div>
            `;
            messageFeed.appendChild(card);
            return;
        }

        subset.forEach(msg => {
            const card = document.createElement('div');
            card.className = 'message-card';

            const dateStr = new Date(msg.created_at).toLocaleDateString([], {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            let imageHTML = '';
            if (msg.image_url) {
                imageHTML = `<img src="${msg.image_url}" class="message-image" alt="uploaded file">`;
            }

            card.innerHTML = `
                ${imageHTML}
                <div class="message-text">${escapeHTML(msg.text)}</div>
                <div class="message-meta">@${escapeHTML(msg.codename)} • ${dateStr}</div>
            `;
            messageFeed.appendChild(card);
        });

        messageFeed.scrollTop = messageFeed.scrollHeight;
    }

    // Process Forms
    messageForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (!text && !selectedFile) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "..";

        let image_url = null;

        if (selectedFile) {
            const ext = selectedFile.name.split('.').pop();
            const path = `${Math.random().toString(36).substring(2)}-${Date.now()}.${ext}`;

            const { error: uploadError } = await supabaseClient.storage
                .from('message-images')
                .upload(path, selectedFile);

            if (!uploadError) {
                const { data } = supabaseClient.storage.from('message-images').getPublicUrl(path);
                image_url = data.publicUrl;
            }
        }

        const { error } = await supabaseClient
            .from('messages')
            .insert([{ codename: currentActiveThread, text: text, image_url: image_url }]);

        submitBtn.disabled = false;
        submitBtn.innerText = "Send";

        if (!error) {
            customEmptyThreads = customEmptyThreads.filter(name => name !== currentActiveThread);
            
            messageInput.value = '';
            selectedFile = null;
            previewContainer.style.display = 'none';
            imgPreview.src = '';
            fetchSystemLogs();
        } else {
            alert("Could not send message.");
        }
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    fetchSystemLogs();
    setInterval(fetchSystemLogs, 8000);
</script>

</body>
</html>
