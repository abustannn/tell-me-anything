<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messages</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* True iOS Dark & Light Mode System Configurations */
        :root {
            --bg-system: #ffffff;
            --bg-secondary: #f2f2f7;
            --bg-bubble-gray: #e9e9eb;
            --bg-bubble-blue: #007aff;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --border: #c6c6c8;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-system: #000000;
                --bg-secondary: #1c1c1e;
                --bg-bubble-gray: #262629;
                --bg-bubble-blue: #0a84ff;
                --text-main: #ffffff;
                --text-muted: #8e8e93;
                --border: #3a3a3c;
                --nav-bg: rgba(28, 28, 30, 0.85);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-system);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* iOS App Shell Container Setup */
        .phone-wrapper {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: var(--bg-system);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        @media (min-width: 421px) {
            .phone-wrapper {
                height: 85vh;
                border-radius: 30px;
                border: 1px solid var(--border);
                box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            }
        }

        /* Views management layout mechanics */
        .view {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.3s cubic-bezier(0.1, 1, 0.1, 1);
            background: var(--bg-system);
        }

        #listExtensionView { z-index: 2; transform: translateX(0); }
        #chatDetailView { z-index: 3; transform: translateX(100%); }
        .slide-out { transform: translateX(-20%); }
        .slide-in { transform: translateX(0) !important; }

        /* iOS Blur Effect Header Framework */
        .ios-navbar {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--nav-bg);
            border-bottom: 0.5px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .list-header {
            flex-direction: column;
            align-items: flex-start;
            padding-top: 20px;
        }

        .list-header-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            color: var(--bg-bubble-blue);
            font-size: 16px;
        }

        .list-title {
            font-size: 32px;
            font-weight: 700;
            margin-top: 10px;
            color: var(--text-main);
        }

        .search-bar-container {
            width: 100%;
            padding: 8px 16px;
            background: var(--bg-system);
        }

        .search-bar {
            width: 100%;
            padding: 8px 12px 8px 32px;
            border-radius: 10px;
            background: var(--bg-secondary);
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        /* iOS List Interfacing Typography & Layouts */
        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }

        .thread-item {
            display: flex;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 0.5px solid var(--border);
            align-items: center;
        }

        .thread-item:active {
            background-color: var(--bg-secondary);
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .avatar-initials {
            text-transform: uppercase;
        }

        .thread-details {
            flex: 1;
            overflow: hidden;
        }

        .thread-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        .thread-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-main);
        }

        .thread-time {
            font-size: 14px;
            color: var(--text-muted);
        }

        .thread-preview {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* iOS Chat Bubble Messaging Framework */
        .chat-navbar {
            justify-content: space-between;
        }

        .back-btn {
            color: var(--bg-bubble-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 17px;
            background: none;
            border: none;
            outline: none;
        }

        .chat-target-meta {
            text-align: center;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .chat-target-name {
            font-size: 13px;
            font-weight: 600;
            margin-top: 2px;
        }

        .chat-feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-system);
        }

        .date-divider {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bubble-row {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
        }

        .bubble-incoming { justify-content: flex-start; }
        .bubble-outgoing { justify-content: flex-end; }

        .bubble {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            word-break: break-word;
        }

        .bubble-incoming .bubble {
            background-color: var(--bg-bubble-gray);
            color: var(--text-main);
        }

        .bubble-outgoing .bubble {
            background-color: var(--bg-bubble-blue);
            color: #ffffff;
        }

        .bubble-image {
            max-width: 100%;
            border-radius: 14px;
            margin-bottom: 4px;
            display: block;
        }

        /* iOS Modern Native Bottom Composition Deck */
        .ios-input-bar {
            padding: 8px 12px 24px 12px;
            border-top: 0.5px solid var(--border);
            background: var(--bg-system);
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .camera-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            padding-bottom: 4px;
        }

        .input-pill {
            flex: 1;
            background: var(--bg-secondary);
            border: 0.5px solid var(--border);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ios-chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            resize: none;
            height: 24px;
            max-height: 80px;
        }

        .send-pill-btn {
            background: var(--bg-bubble-blue);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.1s;
        }

        .send-pill-btn:disabled {
            opacity: 0.3;
        }

        /* Live image upload preview thumbnail styling */
        .bar-preview-box {
            display: none;
            position: relative;
            width: 50px;
            height: 50px;
        }

        .bar-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        .bar-preview-close {
            position: absolute;
            top: -4px;
            right: -4px;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 50%;
            border: none;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="phone-wrapper">

    <div class="view" id="listExtensionView">
        <div class="ios-navbar list-header">
            <div class="list-header-top">
                <span>Edit</span>
                <span>📝</span>
            </div>
            <h1 class="list-title">Messages</h1>
        </div>
        <div class="search-bar-container">
            <input type="text" class="search-bar" placeholder="Search" disabled>
        </div>
        <div class="conversation-list" id="threadContainer">
            </div>
    </div>

    <div class="view" id="chatDetailView">
        <div class="ios-navbar chat-navbar">
            <button class="back-btn" id="backToDeckBtn">◀ Messages</button>
            <div class="chat-target-meta">
                <div class="avatar" style="width:30px; height:30px; font-size:12px; margin:0 auto;" id="chatNavAvatar">CA</div>
                <div class="chat-target-name" id="chatNavName">Christian Abustan</div>
            </div>
            <div style="width: 40px;"></div>
        </div>

        <div class="chat-feed" id="chatFeedWindow">
            </div>

        <form class="ios-input-bar" id="chatActionForm">
            <label for="chatMediaFile" class="camera-btn">📷</label>
            <input type="file" id="chatMediaFile" accept="image/*" style="display:none;">
            
            <div class="input-pill">
                <div class="bar-preview-box" id="barPreview">
                    <img src="" id="barPreviewImg" class="bar-preview-img">
                    <button type="button" class="bar-preview-close" id="barPreviewClose">×</button>
                </div>
                <textarea class="ios-chat-input" id="chatTextField" placeholder="iMessage" required></textarea>
            </div>
            
            <button type="submit" class="send-pill-btn" id="sendBtnDeck">⬆</button>
        </form>
    </div>

</div>

<script>
    const SUPABASE_URL = 'https://muxekpbcawffuvszaxmk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q-MoQP1-Assz9V9UJQP4LQ_q7E8GowV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Dom routing registry
    const listExtensionView = document.getElementById('listExtensionView');
    const chatDetailView = document.getElementById('chatDetailView');
    const threadContainer = document.getElementById('threadContainer');
    const chatFeedWindow = document.getElementById('chatFeedWindow');
    const backToDeckBtn = document.getElementById('backToDeckBtn');
    const chatActionForm = document.getElementById('chatActionForm');
    const chatTextField = document.getElementById('chatTextField');
    const chatMediaFile = document.getElementById('chatMediaFile');
    
    const barPreview = document.getElementById('barPreview');
    const barPreviewImg = document.getElementById('barPreviewImg');
    const barPreviewClose = document.getElementById('barPreviewClose');
    const sendBtnDeck = document.getElementById('sendBtnDeck');

    const chatNavAvatar = document.getElementById('chatNavAvatar');
    const chatNavName = document.getElementById('chatNavName');

    let currentActiveThread = "Christian Abustan"; 
    let allGlobalMessages = [];
    let selectedImageFile = null;

    // Monitor input dynamic size growth to mimic iMessage framework expansion
    chatTextField.addEventListener('input', function() {
        this.style.height = '24px';
        this.style.height = (this.scrollHeight - 10) + 'px';
    });

    // Attachment thumbnail triggers
    chatMediaFile.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file) {
            selectedImageFile = file;
            barPreviewImg.src = URL.createObjectURL(file);
            barPreview.style.display = 'block';
        }
    });

    barPreviewClose.addEventListener('click', () => {
        selectedImageFile = null;
        chatMediaFile.value = '';
        barPreview.style.display = 'none';
        barPreviewImg.src = '';
    });

    // Handle View Navigation
    backToDeckBtn.addEventListener('click', () => {
        chatDetailView.classList.remove('slide-in');
        listExtensionView.classList.remove('slide-out');
    });

    function navigateToChat(codename) {
        currentActiveThread = codename;
        chatNavName.innerText = codename;
        
        // Setup initial initials icon
        const initialStr = codename.trim().substring(0, 2);
        chatNavAvatar.innerText = initialStr;

        renderChatBubbles();
        
        listExtensionView.classList.add('slide-out');
        chatDetailView.classList.add('slide-in');
    }

    // Engine sorting logic: aggregates incoming items dynamically by user handle
    async function syncSystemLogs() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });

        if (error) {
            console.error(error);
            return;
        }

        allGlobalMessages = data || [];
        renderThreadDeck();
        if(chatDetailView.classList.contains('slide-in')) {
            renderChatBubbles();
        }
    }

    function renderThreadDeck() {
        // Group unique profiles by tracking codenames 
        const threadsMap = {};

        // Always force primary identity creation initialization
        threadsMap["Christian Abustan"] = {
            codename: "Christian Abustan",
            text: "Tap here to leave an anonymous note...",
            created_at: new Date().toISOString()
        };

        allGlobalMessages.forEach(msg => {
            threadsMap[msg.codename] = msg;
        });

        // Sort by chronological activity logs
        const sortedThreads = Object.values(threadsMap).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        
        threadContainer.innerHTML = '';
        sortedThreads.forEach(th => {
            const date = new Date(th.created_at);
            const timeLabel = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const initials = th.codename.substring(0,2);

            const item = document.createElement('div');
            item.className = 'thread-item';
            item.innerHTML = `
                <div class="avatar"><span class="avatar-initials">${escapeHTML(initials)}</span></div>
                <div class="thread-details">
                    <div class="thread-meta">
                        <span class="thread-name">${escapeHTML(th.codename)}</span>
                        <span class="thread-time">${timeLabel}</span>
                    </div>
                    <div class="thread-preview">${escapeHTML(th.text || "Sent an image")}</div>
                </div>
            `;
            item.addEventListener('click', () => navigateToChat(th.codename));
            threadContainer.appendChild(item);
        });
    }

    function renderChatBubbles() {
        chatFeedWindow.innerHTML = '';
        
        // Filter elements belonging exclusively to this room channel
        const subset = allGlobalMessages.filter(m => m.codename === currentActiveThread);

        if(subset.length === 0) {
            chatFeedWindow.innerHTML = `<div class="date-divider">No Messages Yet</div>`;
            return;
        }

        let lastDateString = "";

        subset.forEach(msg => {
            const timestamp = new Date(msg.created_at);
            
            // Generate clean date dividers like standard iMessage
            const dateDividerText = timestamp.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
            if (dateDividerText !== lastDateString) {
                const div = document.createElement('div');
                div.className = 'date-divider';
                div.innerText = `${dateDividerText} • ${timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
                chatFeedWindow.appendChild(div);
                lastDateString = dateDividerText;
            }

            const row = document.createElement('div');
            // If it is the default prompt message, keep it left-aligned; incoming posts display as native right-aligned bubbles
            const isBasePrompt = (msg.id === undefined || msg.text.includes("anonymous message space"));
            row.className = `bubble-row ${isBasePrompt ? 'bubble-incoming' : 'bubble-outgoing'}`;

            let imgPayload = '';
            if (msg.image_url) {
                imgPayload = `<img src="${msg.image_url}" class="bubble-image" alt="User upload file asset">`;
            }

            row.innerHTML = `
                <div class="bubble">
                    ${imgPayload}
                    <div>${escapeHTML(msg.text)}</div>
                </div>
            `;
            chatFeedWindow.appendChild(row);
        });

        chatFeedWindow.scrollTop = chatFeedWindow.scrollHeight;
    }

    // Process Message Form Delivery Action
    chatActionForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = chatTextField.value.trim();
        if(!text && !selectedImageFile) return;

        sendBtnDeck.disabled = true;
        let image_url = null;

        if (selectedImageFile) {
            const ext = selectedImageFile.name.split('.').pop();
            const path = `${Math.random().toString(36).substring(2)}-${Date.now()}.${ext}`;

            const { error: uploadError } = await supabaseClient.storage
                .from('message-images')
                .upload(path, selectedImageFile);

            if (!uploadError) {
                const { data } = supabaseClient.storage.from('message-images').getPublicUrl(path);
                image_url = data.publicUrl;
            }
        }

        const { error } = await supabaseClient
            .from('messages')
            .insert([{ codename: currentActiveThread, text: text, image_url: image_url }]);

        sendBtnDeck.disabled = false;

        if (!error) {
            chatTextField.value = '';
            chatTextField.style.height = '24px';
            selectedImageFile = null;
            barPreview.style.display = 'none';
            barPreviewImg.src = '';
            syncSystemLogs();
        } else {
            alert("Error sending message.");
        }
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // Engine Polling Intervals
    syncSystemLogs();
    setInterval(syncSystemLogs, 8000);
</script>

</body>
</html>
