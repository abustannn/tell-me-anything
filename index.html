<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Board</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS Minimalist Monochrome Theme */
        :root {
            --bg-global: #fafafa;
            --bg-container: #ffffff;
            --border: #e5e5ea;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --input-bg: #f2f2f7;
            --btn-bg: #1c1c1e;
            --btn-text: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-global: #121212;
                --bg-container: #1c1c1e;
                --border: #2c2c2e;
                --text-main: #ffffff;
                --text-muted: #8e8e93;
                --input-bg: #2c2c2e;
                --btn-bg: #ffffff;
                --btn-text: #1c1c1e;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-global);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            transition: background-color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-container);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            overflow: hidden;
        }

        header {
            padding: 24px 20px 16px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message-card {
            align-self: flex-start;
            max-width: 85%;
            animation: fadeIn 0.25s ease-out;
        }

        .message-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 6px;
            display: block;
            background-color: var(--input-bg);
        }

        .message-text {
            font-size: 15px;
            line-height: 1.45;
            color: var(--text-main);
            word-break: break-word;
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin: auto;
            font-size: 14px;
        }

        .input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-container);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ios-input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: none;
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        textarea.ios-input {
            resize: none;
            height: 64px;
        }

        /* Interactive iOS attachment row */
        .attachment-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-label {
            background: var(--input-bg);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            transition: opacity 0.1s;
        }

        .file-label:active {
            opacity: 0.6;
        }

        /* Tiny thumbnail preview look */
        .preview-container {
            display: none;
            position: relative;
            align-self: flex-start;
            margin-bottom: 4px;
        }

        .img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .remove-preview {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ios-btn {
            flex: 1;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            height: 45px;
            transition: opacity 0.1s, transform 0.1s;
        }

        .ios-btn:active {
            opacity: 0.8;
            transform: scale(0.99);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Messages</h1>
        <p>Anonymous and secure</p>
    </header>

    <div class="feed" id="messageFeed">
        <div class="empty-state" id="emptyState">Loading messages...</div>
    </div>

    <div class="input-area">
        <form id="messageForm" class="input-group">
            <input type="text" id="codenameInput" class="ios-input" placeholder="Codename" required maxlength="20">
            <textarea id="messageInput" class="ios-input" placeholder="Write a message..." required maxlength="300"></textarea>
            
            <div class="preview-container" id="previewContainer">
                <img src="" id="imgPreview" class="img-preview">
                <button type="button" class="remove-preview" id="removePreviewBtn">×</button>
            </div>

            <div class="attachment-row">
                <label for="imageInput" class="file-label">🖼️</label>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                
                <button type="submit" id="submitBtn" class="ios-btn">Send</button>
            </div>
        </form>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://muxekpbcawffuvszaxmk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q-MoQP1-Assz9V9UJQP4LQ_q7E8GowV';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messageForm = document.getElementById('messageForm');
    const messageFeed = document.getElementById('messageFeed');
    const emptyState = document.getElementById('emptyState');
    const submitBtn = document.getElementById('submitBtn');
    
    const imageInput = document.getElementById('imageInput');
    const previewContainer = document.getElementById('previewContainer');
    const imgPreview = document.getElementById('imgPreview');
    const removePreviewBtn = document.getElementById('removePreviewBtn');

    let selectedFile = null;

    // Handle Image Selection and Generation of Thumbnail
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            selectedFile = file;
            imgPreview.src = URL.createObjectURL(file);
            previewContainer.style.display = 'block';
        }
    });

    // Handle Removing Selected Image Preview
    removePreviewBtn.addEventListener('click', () => {
        selectedFile = null;
        imageInput.value = '';
        previewContainer.style.display = 'none';
        imgPreview.src = '';
    });

    // Fetch messages live from Supabase
    async function fetchMessages() {
        const { data, error } = await supabaseClient
            .from('messages')
            .select('*')
            .order('id', { ascending: true });

        if (error) {
            console.error('Error fetching data:', error);
            emptyState.innerText = "Failed to load messages.";
            return;
        }

        if (!data || data.length === 0) {
            emptyState.style.display = 'block';
            emptyState.innerText = "No messages yet.";
            messageFeed.innerHTML = '';
            messageFeed.appendChild(emptyState);
            return;
        }

        emptyState.style.display = 'none';
        messageFeed.innerHTML = '';

        data.forEach(msg => {
            const card = document.createElement('div');
            card.className = 'message-card';
            
            const dateStr = new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Render image conditionally if it exists in the row data
            let imageHTML = '';
            if (msg.image_url) {
                imageHTML = `<img src="${msg.image_url}" class="message-image" alt="uploaded graphic">`;
            }

            card.innerHTML = `
                ${imageHTML}
                <div class="message-text">${escapeHTML(msg.text)}</div>
                <div class="message-meta">@${escapeHTML(msg.codename)} • ${dateStr}</div>
            `;
            messageFeed.appendChild(card);
        });

        messageFeed.scrollTop = messageFeed.scrollHeight;
    }

    // Insert new message + upload image if attached
    messageForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const codename = document.getElementById('codenameInput').value.trim();
        const text = document.getElementById('messageInput').value.trim();
        
        if (!codename || !text) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";

        let image_url = null;

        // If an image file is present, push to Bucket storage first
        if (selectedFile) {
            const fileExt = selectedFile.name.split('.').pop();
            const fileName = `${Math.random().toString(36).substring(2)}-${Date.now()}.${fileExt}`;
            const filePath = `${fileName}`;

            const { error: uploadError } = await supabaseClient
                .storage
                .from('message-images')
                .upload(filePath, selectedFile);

            if (uploadError) {
                console.error("Storage Error:", uploadError);
                alert("Image fail to upload. Sending text only.");
            } else {
                // Generate raw public access URL asset link
                const { data } = supabaseClient.storage.from('message-images').getPublicUrl(filePath);
                image_url = data.publicUrl;
            }
        }

        const { error } = await supabaseClient
            .from('messages')
            .insert([{ codename, text, image_url }]);

        submitBtn.disabled = false;
        submitBtn.innerText = "Send";

        if (error) {
            alert('Could not send message.');
            console.error(error);
        } else {
            // Clean interface states
            document.getElementById('messageInput').value = '';
            selectedFile = null;
            previewContainer.style.display = 'none';
            imgPreview.src = '';
            fetchMessages(); 
        }
    });

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    fetchMessages();
    setInterval(fetchMessages, 10000);
</script>

</body>
</html>
